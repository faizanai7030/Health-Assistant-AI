kind = "video"
previewPath = "/patient-demo-video/"
title = "Patient Booking Demo"
version = "1.0.0"
id = "artifacts/patient-demo-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/patient-demo-video/" ]
localPort = 20356

[services.development]
run = "pnpm --filter @workspace/patient-demo-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/patient-demo-video", "run", "build" ]
publicDir = "artifacts/patient-demo-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20356"
BASE_PATH = "/patient-demo-video/"
